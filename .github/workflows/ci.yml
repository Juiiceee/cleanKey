name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Package app
        run: ./scripts/package_app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanKey
          path: .build/app/CleanKey.zip
